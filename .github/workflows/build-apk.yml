name: Build APK

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master, copilot/fix-build-issues ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool libltdl-dev pkg-config \
            zlib1g-dev libncurses-dev libtinfo6 cmake \
            libffi-dev libssl-dev

      - name: Install Android SDK build-tools and platform-tools
        run: |
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          
          # Accept all SDK licenses (standard + preview) upfront
          yes | sdkmanager --licenses || true
          
          # Create buildozer SDK directory structure
          BUILDOZER_SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p "$BUILDOZER_SDK"
          
          # Copy cmdline-tools to buildozer's SDK location
          cp -r "$ANDROID_SDK_ROOT/cmdline-tools" "$BUILDOZER_SDK/" 2>/dev/null || true
          
          # Create the legacy 'tools' path that buildozer expects
          mkdir -p "$BUILDOZER_SDK/tools/bin"
          ln -sf "$BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager" "$BUILDOZER_SDK/tools/bin/sdkmanager"
          ln -sf "$BUILDOZER_SDK/cmdline-tools/latest/bin/avdmanager" "$BUILDOZER_SDK/tools/bin/avdmanager"
          
          # Copy licenses to buildozer SDK location
          mkdir -p "$BUILDOZER_SDK/licenses"
          cp -r "$ANDROID_SDK_ROOT/licenses/"* "$BUILDOZER_SDK/licenses/" 2>/dev/null || true
          
          # Install specific build-tools version at buildozer's expected location
          "$BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$BUILDOZER_SDK" --install \
            "build-tools;34.0.0" \
            "platform-tools" \
            "platforms;android-33"
          
          # Accept all licenses for buildozer's SDK location
          yes | "$BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$BUILDOZER_SDK" --licenses || true
          
          # Verify installation
          echo "Build-tools installed:"
          ls -la "$BUILDOZER_SDK/build-tools/"
          echo "SDK structure:"
          ls -la "$BUILDOZER_SDK/"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36  # TODO: remove pin after Buildozer adds Cython 3 support for Python 3.11/3.12

      - name: Build debug APK
        working-directory: android_share_zip_mvp
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharetozip-apk
          path: android_share_zip_mvp/bin/*.apk
          if-no-files-found: error
