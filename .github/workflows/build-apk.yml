name: Build APK

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master, copilot/fix-build-issues ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev libtinfo6 cmake \
            libffi-dev libssl-dev

      - name: Install Android SDK build-tools and platform-tools
        run: |
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          # Accept all licenses including preview licenses
          yes | sdkmanager --licenses || true
          # Pre-install build-tools 34.0.0 in buildozer's expected location
          mkdir -p $HOME/.buildozer/android/platform/android-sdk
          sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --install "build-tools;34.0.0" "platform-tools" "platforms;android-33"
          # Accept licenses for buildozer's SDK location as well
          yes | sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36  # TODO: remove pin after Buildozer adds Cython 3 support for Python 3.11/3.12

      - name: Build debug APK
        working-directory: android_share_zip_mvp
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharetozip-apk
          path: android_share_zip_mvp/bin/*.apk
          if-no-files-found: error
